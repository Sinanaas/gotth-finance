services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: habahaba98
      POSTGRES_DB: gotth_finance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - app.env
    depends_on:
      - db

volumes:
  postgres_data: